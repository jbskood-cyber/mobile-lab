name: Mobile validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Unit tests
        run: npm test

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log

      - name: Enforce typecheck
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Lint
        run: npm run lint

      - name: Expo Doctor
        run: npx expo-doctor@latest

      - name: Export Android bundle
        run: npx expo export --platform android --no-minify --no-bytecode --max-workers 2
