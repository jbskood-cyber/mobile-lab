name: Mobile validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Unit tests
        shell: bash
        run: set -o pipefail && npm test 2>&1 | tee unit-test.log

      - name: Upload failed unit-test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-test.log
          retention-days: 3

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Expo Doctor
        run: npx expo-doctor@latest

      - name: Export Android bundle
        run: npx expo export --platform android --no-minify --no-bytecode --max-workers 2
